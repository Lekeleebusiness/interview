name: Release Cardmarket App

on:
  release:
    types:
      - published

env:
  IMAGE_NAME: lekelee/simple-k8s-node-app

permissions:
  contents: write

jobs:
  build-push-and-update-helm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract release version
        id: version
        shell: bash
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semantic version: $VERSION"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t "${IMAGE_NAME}:${{ steps.version.outputs.version }}" \
            -t "${IMAGE_NAME}:${GITHUB_SHA}" \
            ./app

      - name: Push Docker images
        run: |
          docker push "${IMAGE_NAME}:${{ steps.version.outputs.version }}"
          docker push "${IMAGE_NAME}:${GITHUB_SHA}"

      - name: Update image tag in Helm values
        run: |
          sed -i \
            "s|^[[:space:]]*tag:.*|  tag: \"${{ steps.version.outputs.version }}\"|" \
            helm/values.yaml

          echo "Updated Helm values:"
          grep -A 3 '^image:' helm/values.yaml

      - name: Commit and push updated image tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add helm/values.yaml

          if git diff --cached --quiet; then
            echo "No Helm values changes to commit."
            exit 0
          fi

          git commit -m \
            "chore(deploy): update image to ${{ steps.version.outputs.version }} [skip ci]"

          git push origin HEAD:main