apiVersion: apps/v1
kind: Deployment
metadata:
  name: cardmarket-app
  namespace: cardmarket
  labels:
    app: cardmarket-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cardmarket-app
  template:
    metadata:
      labels:
        app: cardmarket-app
    spec:
      containers:
        - name: cardmarket-app
          image: lekelee/simple-k8s-node-app:6a1a33ea46f63a2c3896a3baf5ce67cd47739b06
          ports:
            - containerPort: 8080
        