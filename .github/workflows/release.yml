name: CI for Cardmarket App

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/**"

env:
  IMAGE_NAME: lekelee/simple-k8s-node-app

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t "${IMAGE_NAME}:${GITHUB_SHA}" \
            ./app

      - name: Push Docker image
        run: |
          docker push "${IMAGE_NAME}:${GITHUB_SHA}"

      - name: Update image tag in Helm values
        run: |
          sed -i \
            "s|^[[:space:]]*tag:.*|  tag: \"${GITHUB_SHA}\"|" \
            helm/values.yaml

          echo "Updated Helm values:"
          grep -A 3 '^image:' helm/values.yaml

      - name: Commit and push updated image tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add helm/values.yaml

          if git diff --cached --quiet; then
            echo "No Helm values changes to commit."
            exit 0
          fi

          git commit -m "chore: deploy image ${GITHUB_SHA} [skip ci]"
          git push