name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

env:
  IMAGE_NAME: lekelee/simple-k8s-node-app

jobs:
  release-please:
    runs-on: ubuntu-latest

    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: simple

      - name: Checkout repository
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Login to Docker Hub
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          VERSION: ${{ steps.release.outputs.tag_name }}
        run: |
          VERSION="${VERSION#v}"

          docker build \
            -t "${IMAGE_NAME}:${VERSION}" \
            -t "${IMAGE_NAME}:${GITHUB_SHA}" \
            ./app

          docker push "${IMAGE_NAME}:${VERSION}"
          docker push "${IMAGE_NAME}:${GITHUB_SHA}"

      - name: Update image tag in Helm values
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          VERSION: ${{ steps.release.outputs.tag_name }}
        run: |
          VERSION="${VERSION#v}"

          sed -i \
            "s|^[[:space:]]*tag:.*|  tag: \"${VERSION}\"|" \
            helm/values.yaml

          grep -A 3 '^image:' helm/values.yaml

      - name: Commit Helm image update
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          VERSION: ${{ steps.release.outputs.tag_name }}
        run: |
          VERSION="${VERSION#v}"

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add helm/values.yaml

          if git diff --cached --quiet; then
            echo "No Helm values changes to commit."
            exit 0
          fi

          git commit -m "chore(deploy): update image to ${VERSION}"
          git push origin HEAD:main